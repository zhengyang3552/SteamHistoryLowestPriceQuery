name: Issue AI Assistant - 自动分析与建议

on:
  issues:
    types: [opened]

jobs:
  analyze-issue:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests

      - name: Get repository code context
        id: repo-context
        run: |
          # 获取主要代码文件内容用于AI分析
          echo "REPO_CONTEXT=$(cat << 'EOF'
          # Repository: Steam History Lowest Price Query
          ## Main File: SteamHistoryLowestPriceQuery.js
          
          $(head -100 SteamHistoryLowestPriceQuery.js)
          
          ## README:
          $(head -30 README.md)
          EOF
          )" >> $GITHUB_OUTPUT

      - name: Analyze issue with NVIDIA AI
        id: analyze
        env:
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_AUTHOR: ${{ github.event.issue.user.login }}
          REPO_CONTEXT: ${{ steps.repo-context.outputs.REPO_CONTEXT }}
        run: |
          python .github/scripts/analyze_issue.py

      - name: Comment on issue
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const comment_content = fs.readFileSync('/tmp/issue_analysis.txt', 'utf8');
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment_content
            });
