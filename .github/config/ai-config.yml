# AI 助手配置文件
# 用于 GitHub Actions 工作流中的 AI 功能配置

# ============================================
# AI 助手基本信息配置
# ============================================

# AI 助手的名字（用于 @mention）
# 支持格式: @AI, @Bot, @Assistant 等
# 修改后会自动应用到所有工作流
AI_MENTION_NAME: AI

# AI 助手的显示名称（用于回复中）
AI_DISPLAY_NAME: 🤖 AI 助手

# ============================================
# NVIDIA AI 服务配置
# ============================================

# API 端点（NVIDIA Integrate API）
NVIDIA_API_URL: https://integrate.api.nvidia.com/v1/chat/completions

# 使用的模型
# 选项: openai/gpt-oss-120b, meta/llama-3.1-405b-instruct 等
NVIDIA_MODEL: openai/gpt-oss-120b

# 模型参数
MODEL_TEMPERATURE: 0.7          # 创意度 (0-1, 越低越保守)
MODEL_MAX_TOKENS: 2500          # Issue 分析最大 token 数
CHATBOT_MAX_TOKENS: 1500        # 聊天回复最大 token 数
MODEL_TOP_P: 0.9                # nucleus sampling 参数

# API 密钥（通过 GitHub Secrets 传入，不要在此填写）
# 在 Settings > Secrets > NVIDIA_API_KEY 中配置

# ============================================
# Issue 分析功能配置
# ============================================

# 是否启用 Issue 自动分析
ENABLE_ISSUE_ANALYSIS: true

# Issue 分析的工作流名称
ISSUE_ANALYZER_WORKFLOW: issue-analyzer.yml

# 分析结果中的标签建议
# 用于 GitHub issue labels，以逗号分隔
SUGGESTED_LABELS: bug,enhancement,documentation,question

# Issue 分析的提示词风格
# 选项: detailed(详细), brief(简洁)
ISSUE_ANALYSIS_STYLE: detailed

# ============================================
# 聊天机器人功能配置
# ============================================

# 是否启用聊天机器人
ENABLE_CHATBOT: true

# 聊天机器人的工作流名称
CHATBOT_WORKFLOW: ai-chatbot.yml

# 聊天超时时间（秒）
CHATBOT_TIMEOUT: 60

# 是否支持多轮对话
SUPPORT_MULTI_TURN: true

# 聊天记录保留时间（天）
# 0 = 不保留，每次独立对话
CHAT_HISTORY_RETENTION: 0

# ============================================
# 项目上下文信息
# ============================================

# 项目名称
PROJECT_NAME: Steam History Lowest Price Query

# 项目描述
PROJECT_DESCRIPTION: 基于 Watt Toolkit 的 Steam 游戏价格历史查询脚本

# 主要技术栈
PROJECT_TECH_STACK: JavaScript, UserScript, Tampermonkey

# 项目主要功能（用于 AI 理解上下文）
PROJECT_FEATURES: |
  - 在 Steam 商店页面显示游戏历史最低价格
  - 支持多种货币和地区
  - 集成 Augmented Steam API
  - 支持 UserScript 框架（Tampermonkey、篡改猴等）
  - 显示价格折扣信息和到期时间

# ============================================
# 通知和输出配置
# ============================================

# 是否在 AI 回复中提及提问者
MENTION_USER_IN_REPLY: true

# 回复格式
# 选项: markdown, plain
REPLY_FORMAT: markdown

# 是否添加 AI 响应时间戳
ADD_TIMESTAMP: true

# ============================================
# 高级配置
# ============================================

# 是否启用调试模式
# 调试模式下会输出更多日志信息
DEBUG_MODE: false

# 日志级别
# 选项: DEBUG, INFO, WARNING, ERROR
LOG_LEVEL: INFO

# 是否保存所有 AI 交互的日志
SAVE_AI_LOGS: false

# 响应缓存时间（秒）
# 相同问题在此时间内会返回缓存结果
RESPONSE_CACHE_TIME: 3600

# ============================================
# 使用说明
# ============================================

# 这个配置文件被 GitHub Actions 工作流引用
# 工作流脚本会读取这些值来配置 AI 功能
#
# 修改此文件后：
# 1. 提交更改到主分支
# 2. 新的工作流运行会自动使用新配置
# 3. 无需手动更新工作流文件
#
# 常见修改：
# 
# 改 AI 名字: 修改 AI_MENTION_NAME 的值
# 例如: AI_MENTION_NAME: Bot
#
# 改模型: 修改 NVIDIA_MODEL 的值
# 例如: NVIDIA_MODEL: meta/llama-3.1-405b-instruct
#
# 改创意度: 修改 MODEL_TEMPERATURE 的值
# 例如: MODEL_TEMPERATURE: 0.5 (更保守)
#      MODEL_TEMPERATURE: 0.9 (更创意)
